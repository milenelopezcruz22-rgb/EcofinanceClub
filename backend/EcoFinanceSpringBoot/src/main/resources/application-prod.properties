# Perfil de producción (Railway). Se activa con la variable de entorno
# SPRING_PROFILES_ACTIVE=prod. No reemplaza a application.properties: Spring
# Boot carga primero application.properties y luego sobreescribe con este
# archivo lo que esté definido acá, por lo que el entorno local (perfil por
# defecto) sigue funcionando exactamente igual que antes.

# Railway inyecta el puerto en la variable PORT.
server.port=${PORT:8080}

# Railway (MySQL) inyecta estas variables al enlazar el plugin de MySQL al
# servicio, o se configuran manualmente en las variables del servicio backend.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mismo comportamiento de JPA que en desarrollo (no se cambia la estructura
# de la base de datos ni la estrategia de generación del esquema).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clave secreta de JWT vía variable de entorno (ver JwtService). Si no se
# define JWT_SECRET en Railway, se sigue usando el mismo valor que ya venía
# hardcodeado en el código.
app.jwt.secret=${JWT_SECRET:ecofinance-seguridad-jwt-2026-super-clave-secreta-cambiada}

# Orígenes permitidos por CORS: el dominio propio (con y sin "www").
# Ajustar CORS_ALLOWED_ORIGINS en Railway con el/los dominios reales si
# difieren de estos valores por defecto.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://midominio.com,https://www.midominio.com}
